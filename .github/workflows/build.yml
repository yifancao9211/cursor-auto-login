name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version v${{ steps.pkg.outputs.version }} already released, skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: pnpm install

      - name: Rebuild native modules for Electron
        if: steps.check.outputs.exists == 'false'
        run: npx electron-builder install-app-deps

      - name: Install Playwright Chromium
        if: steps.check.outputs.exists == 'false'
        run: npx playwright install chromium

      - name: Build renderer (Vite)
        if: steps.check.outputs.exists == 'false'
        run: npx vite build

      - name: Build Electron app (unpacked)
        if: steps.check.outputs.exists == 'false'
        run: npx electron-builder --mac --arm64 --dir --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc codesign
        if: steps.check.outputs.exists == 'false'
        run: |
          APP_PATH=$(find release/mac-arm64 -name '*.app' -maxdepth 1 | head -1)
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep "$APP_PATH" && echo "Signature OK"

      - name: Package DMG and ZIP from signed app
        if: steps.check.outputs.exists == 'false'
        run: |
          APP_PATH=$(find release/mac-arm64 -name '*.app' -maxdepth 1 | head -1)
          # electron-builder uses dots instead of spaces in filenames
          APP_NAME=$(basename "$APP_PATH" .app | tr ' ' '.')
          VERSION="${{ steps.pkg.outputs.version }}"

          # Create ZIP
          cd release/mac-arm64
          zip -ry "../${APP_NAME}-${VERSION}-arm64-mac.zip" "$(basename "$APP_PATH")"
          cd ../..

          # Create DMG with Applications symlink (drag-to-install)
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync
          sleep 2
          # hdiutil may fail with "Resource busy" on CI, retry up to 3 times
          for i in 1 2 3; do
            hdiutil create -volname "${APP_NAME}" -srcfolder "$DMG_DIR" -ov -format UDZO "release/${APP_NAME}-${VERSION}-arm64.dmg" && break
            echo "hdiutil attempt $i failed, retrying in 5s..."
            sleep 5
          done
          rm -rf "$DMG_DIR"

          ls -la release/*.dmg release/*.zip

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.pkg.outputs.tag }}" || true
          git push origin "${{ steps.pkg.outputs.tag }}" || true

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.pkg.outputs.tag }}" \
            release/*.dmg release/*.zip \
            --title "${{ steps.pkg.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
